{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
<i class="bi bi-folder2-open"></i> My Files
</h2>

<form method="GET" class="mb-3">

<div class="input-group">

<input type="text" name="q" class="form-control" placeholder="Search files...">

<button class="btn btn-primary">
<i class="bi bi-search"></i>
</button>

</div>

</form>

<table class="table table-hover bg-white shadow-sm">

<thead class="table-dark">

<tr>
<th>File</th>
<th>Date</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for file in files %}

<tr>

<td>
<i class="bi bi-file-earmark"></i>
{{ file.file.name }}
</td>

<td>
{{ file.uploaded_at }}
</td>

<td>


<a href="/download/{{file.id}}" class="btn btn-success btn-sm">
<i class="bi bi-download"></i>
</a>

<a href="/delete/{{file.id}}" class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
