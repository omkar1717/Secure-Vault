<!DOCTYPE html>

<html lang="en">

<head>

<title>SecureVault Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;

background-image:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1451187580459-43490279c0fa");

background-size:cover;
background-position:center;
font-family:Arial, Helvetica, sans-serif;
}

.register-card{
width:400px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:12px;
color:white;
}

.form-control{
background:rgba(255,255,255,0.9);
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="card register-card shadow-lg p-4">

<h3 class="text-center mb-4">
<i class="bi bi-person-plus"></i> Create SecureVault Account
</h3>

<form method="POST">

{% csrf_token %}

<div class="input-group mb-3">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input type="text" name="username" class="form-control" placeholder="Username">

</div>

<div class="input-group mb-3">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input type="email" name="email" class="form-control" placeholder="Email Address">

</div>

<div class="input-group mb-3">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input type="password" name="password" class="form-control" placeholder="Password">

</div>

<button class="btn btn-success w-100 mb-3">
<i class="bi bi-person-check"></i> Register
</button>

</form>

<div class="text-center">

<p class="mb-1">Already have an account?</p>

<a href="/login" class="btn btn-outline-light btn-sm">
Login Here
</a>

</div>

</div>

</body>

</html>
